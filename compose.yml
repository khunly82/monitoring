services:
  prometheus:
    container_name: prometheus
    hostname: prometheus
    image: prom/prometheus:latest
    ports:
      - 9090:9090
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./config/cpu_too_high.rule.yml:/etc/prometheus/cpu_too_high.rule.yml
    networks:
      - monitoring
  mssql:
    container_name: mssql2022
    hostname: mssql2022
    image: mcr.microsoft.com/mssql/server:2022-latest
    env_file:
      .env
    ports:
      - 1433:1433
    networks:
      - monitoring
  mssql_exporter:
    container_name: mssql_exporter
    hostname: mssql_exporter
    image: awaragi/prometheus-mssql-exporter
    ports:
      - 4000:4000
    env_file:
      - .env
    networks:
      - monitoring
  pizza-shop:
    container_name: pizza-shop
    hostname: pizza-shop
    build:
      context: ./pizzaShop
    ports:
      - 8080:8080
    env_file: 
      - .env
    networks:
      - monitoring

  mongodb: 
    container_name: mongodb
    hostname: mongodb
    image: mongo:latest
    ports:
      - 27017:27017
    networks:
      - monitoring
  mongodb_exporter:
    container_name: mongodb_exporter
    hostname: mongodb_exporter
    image: percona/mongodb_exporter:0.49.0
    ports:
      - 9216:9216
    networks:
      - monitoring
    command:
      - '--mongodb.uri=mongodb://mongodb:27017'

  node_orders:
    container_name: node_orders
    hostname: node_orders
    build:
      context: ./orderApi
    env_file: .env
    ports:
      - 3000:3000
    networks:
      - monitoring

  cadvisor:
    container_name: cadvisor
    hostname: cadvisor
    image: gcr.io/cadvisor/cadvisor:latest
    ports:
      - 8081:8080
    networks:
      - monitoring
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro

  alertManager:
    container_name: alert-manager
    hostname: alert-manager
    image: prom/alertmanager:latest
    ports:
      - 9093:9093
    networks:
      - monitoring
    volumes:
      - ./config/alertmanager.yml:/etc/alertmanager/alertmanager.yml

  grafana:
    container_name: grafana
    hostname: grafana
    image: grafana/grafana-oss:latest
    ports:
      - 3001:3000
    networks:
      - monitoring
  
  loki:
    container_name: loki
    hostname: loki
    image: grafana/loki:latest
    ports:
      - 3100:3100
    networks: [monitoring]

  otel-collector:
    container_name: otel-collector
    hostname: otel-collector
    image: otel/opentelemetry-collector:latest
    ports:
      - 4317:4317
      - 4318:4318
    volumes:
      - ./config/otel-collector.config.yml:/etc/otelcol/config.yaml
    networks:
      - monitoring

  tempo:
    container_name: tempo
    hostname: tempo
    image: grafana/tempo:latest
    ports:
      - 3200:3200
    volumes:
      - ./config/tempo.yaml:/etc/tempo.yaml

networks:
  monitoring:
  yeyeyy